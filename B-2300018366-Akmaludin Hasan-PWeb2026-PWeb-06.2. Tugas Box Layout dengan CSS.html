<!DOCTYPE html>
<html lang="id">
<head>
<title>Tugas Layout CSS - Akmaludin Hasan</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 0;
  background-color: #f4f4f4;
}

.header {
  background-color: #2c3e50;
  padding: 30px;
  text-align: center;
  font-size: 28px;
  color: white;
}

/* Row 1: Dua Kolom (50% - 50%) */
.column-half {
  float: left;
  width: 50%;
  padding: 20px;
  height: 250px;
  text-align: center;
  border: 1px solid #ddd;
}

/* Row 2: Satu Baris Penuh (100%) */
.column-full {
  float: left;
  width: 100%;
  padding: 20px;
  text-align: center;
  background-color: #ffffff;
  border: 1px solid #ddd;
}

.row:after {
  content: "";
  display: table;
  clear: both;
}

.footer {
  background-color: #34495e;
  color: white;
  padding: 15px;
  text-align: center;
}

@media (max-width: 600px) {
  .column-half, .column-full {
    width: 100%;
  }
}
</style>
</head>
<body>

<div class="header">
  <h2>HEADER</h2>
</div>

<div class="row">
  <div class="column-half" style="background-color:#ecf0f1;">
    <h3>PROFIL MAHASISWA</h3>
    <p>Nama : Akmaludin Hasan</p>
    <p>NIM : 2300018366</p>
    <p>Prodi: Teknik Informatika</p>
  </div>
  
  <div class="column-half" style="background-color:#dfe6e9;">
    <h3>MATA KULIAH</h3>
    <p>Mata Kuliah : Pemrograman Web</p>
    <p>Nama Dosen : Ali Tarmuji, S.T., M.Cs.</p>
  </div>
</div>

<div class="row">
  <div class="column-full" style="background-color:#ecf0f1;">
    <h3>PENUGASAN</h3>
    <p>Tugas Box Layout dengan CSS</p>
  </div>
</div>

<div class="footer">
  <p>Copyright &copy; 2026 - Akmaludin Hasan (2300018366)</p>
</div>

</body>
</html>
